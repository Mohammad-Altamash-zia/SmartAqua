[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps =
  sandeepmistry/LoRa @ ^0.8.0
  rocketscream/Low-Power @ ^1.81

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
  sandeepmistry/LoRa @ ^0.8.0
  bblanchon/ArduinoJson @ ^6.21.3
  arduino-libraries/Arduino MQTT Client @ ^0.1.7
  dfrobot/DFRobotDFPlayerMini @ ^1.0.6